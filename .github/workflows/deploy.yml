name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

# Allow the workflow to publish to Pages via the deployment API.
permissions:
  contents: read
  pages: write
  id-token: write

# Pushes to main share one group so a publish is never cancelled mid-flight.
# Pull requests key on their own ref, so a PR build can't queue behind a deploy
# and a superseded PR build is cancelled rather than left running.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # prebuild (npm) copies the onnxruntime-web wasm into public/ort/, then
      # tsc -b && vite build emits the static site to dist/.
      - run: npm run build

      - run: npm test --silent

      - uses: actions/upload-pages-artifact@v5
        if: github.event_name != 'pull_request'
        with:
          path: dist

  deploy:
    needs: build
    # Pull requests build and test only. Publishing stays on main.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
